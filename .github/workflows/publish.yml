name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest (trusted publishing requires 11.5.1+)
        run: sudo npm install -g npm@latest

      - name: Install dependencies
        run: npm install
        working-directory: ./pi-extension

      - name: Type check
        run: npm run typecheck
        working-directory: ./pi-extension

      - name: Debug npm version and auth
        run: |
          npm --version
          npm config list
          npm whoami || true
        working-directory: ./pi-extension

      - name: Check OIDC env vars
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+set}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+set}"

      - name: Publish to npm
        run: npm publish --loglevel verbose
        working-directory: ./pi-extension
