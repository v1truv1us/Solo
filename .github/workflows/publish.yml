name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org

      - name: Debug npm auth
        run: |
          npm --version
          npm whoami || echo "not authenticated (expected before publish)"

      - name: Install dependencies
        run: npm install
        working-directory: ./pi-extension

      - name: Type check
        run: npm run typecheck
        working-directory: ./pi-extension

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: ./pi-extension
